# Render.com deployment config for Django backend
# Place this file at the root of your repo

services:
  - type: web
    name: chatflow360-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    startCommand: "gunicorn chatflow360.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /api/health/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: chatflow360-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chatflow360-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: chatflow360-redis
          property: connectionString

databases:
  - name: chatflow360-db
    databaseName: chatflow360
    user: chatflow360

  - name: chatflow360-redis
    type: redis
    plan: free
